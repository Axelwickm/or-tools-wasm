syntax = "proto3";

package ortools_wasm.bridge.v1;

message SolverBridgeRequest {
  uint32 request_id = 1;
  string solver = 2;
  SolverExecutionSettings settings = 3;

  oneof operation {
    bytes execute_payload = 10;
    SolverCancelRequest cancel = 11;
  }
}

message SolverExecutionSettings {
  // 0 means that the solver's default resource requirement is requested.
  uint32 requested_threads = 1;
}

message SolverCancelRequest {
  uint32 target_request_id = 1;
}

message SolverBridgeResponse {
  uint32 request_id = 1;
  string solver = 2;
  // 0 means the response is not associated with a server-side queued job.
  uint64 job_id = 3;
  // Monotonically increases for responses belonging to the same job. A zero
  // value means that the transport does not retain a replayable event log.
  uint64 sequence_id = 4;

  oneof payload {
    SolverJobStatus status = 10;
    SolverJobFailure failure = 11;
    bytes event_payload = 12;
    bytes result_payload = 13;
    SolverJobCancelled cancelled = 14;
  }
}

message SolverJobCancelled {
  uint32 target_request_id = 1;
}

message SolverEventBatch {
  repeated SolverBridgeResponse responses = 1;
}

message SolverJobStatus {
  uint32 request_id = 1;
  string solver = 2;
  SolverJobState state = 3;
  uint64 created_at_ms = 4;
  uint64 started_at_ms = 5;
  uint32 allocated_threads = 6;
  uint32 queue_position = 7;
}

enum SolverJobState {
  SOLVER_JOB_STATE_UNSPECIFIED = 0;
  SOLVER_JOB_STATE_QUEUED = 1;
  SOLVER_JOB_STATE_STARTING = 2;
  SOLVER_JOB_STATE_RUNNING = 3;
  SOLVER_JOB_STATE_CANCELLING = 4;
  SOLVER_JOB_STATE_CANCELLED = 5;
  SOLVER_JOB_STATE_SUCCEEDED = 6;
  SOLVER_JOB_STATE_FAILED = 7;
}

message SolverJobFailure {
  uint32 request_id = 1;
  string solver = 2;
  SolverFailureKind kind = 3;
  string message = 4;
  string trace = 5;
  bool retryable = 6;
}

enum SolverFailureKind {
  SOLVER_FAILURE_KIND_UNSPECIFIED = 0;
  SOLVER_FAILURE_KIND_EXECUTOR_ERROR = 1;
  SOLVER_FAILURE_KIND_RUNTIME_LOAD_ERROR = 2;
  SOLVER_FAILURE_KIND_WORKER_CRASH = 3;
  SOLVER_FAILURE_KIND_SERVER_DISCONNECTED = 4;
  SOLVER_FAILURE_KIND_TIMEOUT = 5;
  SOLVER_FAILURE_KIND_CANCELLED = 6;
  SOLVER_FAILURE_KIND_INTERNAL = 7;
  SOLVER_FAILURE_KIND_INVALID_REQUEST = 8;
  SOLVER_FAILURE_KIND_UNAUTHENTICATED = 9;
  SOLVER_FAILURE_KIND_QUEUE_FULL = 10;
  SOLVER_FAILURE_KIND_UNSUPPORTED_SOLVER = 11;
}
